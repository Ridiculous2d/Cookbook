---
layout: default
---

<div class="recipe">

{% if page.image %}

<img
class="recipe-photo"
src="{{ page.image | relative_url }}"
alt="{{ page.title }}">

{% endif %}

<h1>{{ page.title }}</h1>

<p class="recipe-category">

{{ page.category }}

</p>

<div class="recipe-buttons">

<a class="button"
href="{{ page.url | relative_url }}">
View Recipe
</a>

{% if page.recipe_card %}
<a class="button"
href="{{ page.recipe_card | relative_url }}"
download>
Download Recipe Card
</a>
{% endif %}

{% if page.quick_reference %}
<a class="button"
href="{{ page.quick_reference | relative_url }}"
download>
Download Quick Reference
</a>
{% endif %}

</div>

{{ content }}

</div>
